<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Web Shooter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- UI Overlay container -->
    <div class="ui-layer" id="uiComponent">
        <!-- Main Menu / End Game Screen -->
        <div class="menu-card bg-glass">
            <h1 class="logo-text" id="gameTitle">NEON <br> DEFENDER</h1>
            
            <div id="scoreContainer" class="score-display hidden">
                <p>SCORE</p>
                <h2 id="finalScoreText">0</h2>
            </div>
            
            <button id="startGameBtn" class="glow-on-hover">START MISSION</button>
        </div>
    </div>

    <!-- Gameplay Overlay for live score -->
    <div class="live-stats">
        <span>SCORE: <span id="liveScore">0</span></span>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- Include GSAP just in case for some smooth UI animations, but we keep core game on canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
